<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Profile — Smart Farmer</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .profile-hero {
      background: linear-gradient(135deg, #1e3a24 0%, #2d7a3a 100%);
      border-radius: var(--r); padding: 26px 28px; color: #fff;
      display: flex; align-items: center; gap: 20px; margin-bottom: 18px;
      position: relative; overflow: hidden;
    }
    .profile-hero::after { content:'👨‍🌾'; position:absolute; right:24px; bottom:-8px; font-size:6rem; opacity:.12; pointer-events:none; }
    .pro-avatar {
      width: 72px; height: 72px; background: rgba(255,255,255,.2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0; border: 3px solid rgba(255,255,255,.3);
    }
    .pro-info h2 { font-family: 'Lora', serif; font-size: 1.55rem; margin-bottom: 4px; }
    .pro-info p  { opacity: .72; font-size: .84rem; margin-bottom: 10px; }
    .pro-badges  { display: flex; gap: 8px; flex-wrap: wrap; }
    .pro-badge   { background: rgba(255,255,255,.15); padding: 4px 11px; border-radius: 99px; font-size: .7rem; font-weight: 700; }
    .pro-edit-btn {
      margin-left: auto; flex-shrink: 0;
      background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3);
      color: #fff; padding: 8px 16px; border-radius: var(--r-sm);
      font-family: inherit; font-size: .8rem; font-weight: 700;
      cursor: pointer; transition: all var(--t);
    }
    .pro-edit-btn:hover { background: rgba(255,255,255,.25); }
    .danger-card { border: 1.5px solid var(--red-pale) !important; margin-top: 16px; }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <!-- Profile Hero -->
      <div class="profile-hero fade-in">
        <div class="pro-avatar" id="pro-avatar">👨‍🌾</div>
        <div class="pro-info">
          <h2 id="pro-name">Loading…</h2>
          <p id="pro-sub">📱 — &nbsp;·&nbsp; 📍 India</p>
          <div class="pro-badges" id="pro-badges"></div>
        </div>
        <button class="pro-edit-btn" onclick="toggleEdit()">✏️ Edit Profile</button>
      </div>

      <!-- Mini Stats -->
      <div class="mini-stat-row fade-in">
        <div class="mini-stat"><div class="ms-val" id="ps-age">—</div><div class="ms-lbl">Age</div></div>
        <div class="mini-stat"><div class="ms-val" id="ps-roi">—</div><div class="ms-lbl">Last Year ROI</div></div>
        <div class="mini-stat"><div class="ms-val" id="ps-profit">—</div><div class="ms-lbl">Last Profit</div></div>
        <div class="mini-stat"><div class="ms-val" id="ps-qual">—</div><div class="ms-lbl">Education</div></div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs fade-in">
        <button class="ptab active" onclick="showTab('personal',this)">Personal</button>
        <button class="ptab" onclick="showTab('farm',this)">Farm Info</button>
        <button class="ptab" onclick="showTab('financial',this)">Financial</button>
      </div>

      <!-- Personal Tab -->
      <div class="ptab-panel active" id="ptp-personal">
        <div class="card">
          <div class="form-grid">
            <div class="form-group"><label>First Name</label><input id="pf-fn" disabled></div>
            <div class="form-group"><label>Last Name</label><input id="pf-ln" disabled></div>
            <div class="form-group"><label>Mobile (read-only)</label><input id="pf-mob" disabled style="background:var(--bg)"></div>
            <div class="form-group"><label>Age</label><input id="pf-age" type="number" disabled></div>
            <div class="form-group"><label>Gender</label><input id="pf-gen" disabled></div>
            <div class="form-group"><label>Language</label><input id="pf-lang" disabled></div>
            <div class="form-group"><label>Qualification</label><input id="pf-qual" disabled></div>
          </div>
        </div>
      </div>

      <!-- Farm Tab -->
      <div class="ptab-panel" id="ptp-farm">
        <div class="card">
          <div class="section-divider">Location</div>
          <div class="form-grid">
            <div class="form-group"><label>State</label><input id="pf-state" disabled></div>
            <div class="form-group"><label>District</label><input id="pf-dist" disabled></div>
          </div>
          <div class="section-divider">Land & Crop</div>
          <div class="form-grid">
            <div class="form-group"><label>Land Size</label><input id="pf-land" type="number" disabled></div>
            <div class="form-group"><label>Land Unit</label><input id="pf-unit" disabled></div>
            <div class="form-group"><label>Soil Type</label><input id="pf-soil" disabled></div>
            <div class="form-group"><label>Main Crop</label><input id="pf-crop" disabled></div>
            <div class="form-group"><label>Water Source</label><input id="pf-water" disabled></div>
          </div>
          <div class="section-divider">Inputs</div>
          <div class="form-grid">
            <div class="form-group"><label>Fertilizer Used</label><input id="pf-fert" disabled></div>
            <div class="form-group"><label>Pesticide Used</label><input id="pf-pest" disabled></div>
          </div>
        </div>
      </div>

      <!-- Financial Tab -->
      <div class="ptab-panel" id="ptp-financial">
        <div class="card">
          <div class="form-grid">
            <div class="form-group"><label>Last Year Profit (₹)</label><input id="pf-profit" type="number" disabled></div>
            <div class="form-group"><label>Last Year Investment (₹)</label><input id="pf-invest" type="number" disabled></div>
            <div class="form-group"><label>Gov. Subsidy</label><input id="pf-sub" disabled></div>
            <div class="form-group"><label>Additional Business</label><input id="pf-biz" disabled></div>
          </div>
          <div class="section-divider">Feedback</div>
          <div class="form-group"><label>Your Feedback</label><textarea id="pf-fb" disabled></textarea></div>
        </div>
      </div>

      <!-- Save Bar -->
      <div class="save-bar" id="save-bar">
        <p style="font-size:.82rem;color:var(--text-3);">You have unsaved changes</p>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="saveProfile()">💾 Save Changes</button>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="card danger-card fade-in">
        <div class="card-title" style="color:var(--red);">⚠️ Account</div>
        <p style="font-size:.82rem;color:var(--text-3);margin-bottom:12px;">Sign out of your Smart Farmer account on this device.</p>
        <button class="btn" style="background:var(--red);color:#fff;" onclick="Auth.logout()">🚪 Sign Out</button>
      </div>

    </div>
  </main>

  <script src="shared.js"></script>
  <script>
  let isEditing = false, cachedFarmer = null, cachedAdv = null;

  document.addEventListener('DOMContentLoaded', async () => {
    initPage('profile');
    const { farmer, advisory } = await loadFarmerData();
    cachedFarmer = farmer;
    cachedAdv    = advisory;
    updateSidebarFarmer(farmer);
    populateProfile(farmer, advisory);
  });

  function populateProfile(f, adv) {
    document.getElementById('pro-name').textContent = `${f.firstName} ${f.lastName}`;
    document.getElementById('pro-sub').textContent  = `📱 ${f.mobile} · 📍 ${[f.district,f.state].filter(Boolean).join(', ')||'India'}`;
    document.getElementById('pro-avatar').textContent = f.gender === 'Female' ? '👩‍🌾' : '👨‍🌾';

    const total = (f.cows||0)+(f.goats||0)+(f.hens||0);
    document.getElementById('pro-badges').innerHTML = [
      `<span class="pro-badge">🌾 ${f.regularCrop||'Farmer'}</span>`,
      `<span class="pro-badge">🗺️ ${f.landSize} ${f.landUnit}</span>`,
      f.hasLivestock ? `<span class="pro-badge">🐄 ${total} Animals</span>` : ''
    ].join('');

    document.getElementById('ps-age').textContent    = f.age || '—';
    document.getElementById('ps-roi').textContent    = adv?.roi ? adv.roi + '%' : '—';
    document.getElementById('ps-profit').textContent = formatCurrency(f.prevYearProfit);
    document.getElementById('ps-qual').textContent   = f.qualification || '—';

    const sv = (id, v) => { const el=document.getElementById(id); if(el) el.value=v||''; };
    sv('pf-fn',f.firstName); sv('pf-ln',f.lastName); sv('pf-mob',f.mobile);
    sv('pf-age',f.age); sv('pf-gen',f.gender); sv('pf-lang',f.language); sv('pf-qual',f.qualification);
    sv('pf-state',f.state); sv('pf-dist',f.district);
    sv('pf-land',f.landSize); sv('pf-unit',f.landUnit); sv('pf-soil',f.soilType);
    sv('pf-crop',f.regularCrop); sv('pf-water',f.waterSource);
    sv('pf-fert',f.fertilizerUsed); sv('pf-pest',f.pesticideUsed);
    sv('pf-profit',f.prevYearProfit); sv('pf-invest',f.prevYearInvestment);
    sv('pf-sub',f.govSubsidy); sv('pf-biz',f.additionalBusiness); sv('pf-fb',f.feedback);
  }

  function showTab(name, btn) {
    document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.ptab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`ptp-${name}`).classList.add('active');
  }

  function toggleEdit() {
    isEditing = !isEditing;
    document.querySelectorAll('.page-content input:not(#pf-mob), .page-content textarea').forEach(el => el.disabled = !isEditing);
    document.querySelector('.pro-edit-btn').textContent = isEditing ? '✕ Cancel' : '✏️ Edit Profile';
    document.getElementById('save-bar').classList.toggle('show', isEditing);
  }

  function cancelEdit() {
    isEditing = false;
    if (cachedFarmer) populateProfile(cachedFarmer, cachedAdv);
    document.querySelectorAll('.page-content input:not(#pf-mob), .page-content textarea').forEach(el => el.disabled = true);
    document.querySelector('.pro-edit-btn').textContent = '✏️ Edit Profile';
    document.getElementById('save-bar').classList.remove('show');
  }

  function gv(id) { return (document.getElementById(id)?.value||'').trim(); }

  async function saveProfile() {
    const updates = {
      firstName:gv('pf-fn'), lastName:gv('pf-ln'),
      age:parseFloat(gv('pf-age'))||0, gender:gv('pf-gen'), language:gv('pf-lang'), qualification:gv('pf-qual'),
      state:gv('pf-state'), district:gv('pf-dist'),
      landSize:parseFloat(gv('pf-land'))||0, landUnit:gv('pf-unit'),
      soilType:gv('pf-soil'), regularCrop:gv('pf-crop'), waterSource:gv('pf-water'),
      fertilizerUsed:gv('pf-fert'), pesticideUsed:gv('pf-pest'),
      prevYearProfit:parseFloat(gv('pf-profit'))||0, prevYearInvestment:parseFloat(gv('pf-invest'))||0,
      govSubsidy:gv('pf-sub'), additionalBusiness:gv('pf-biz'), feedback:gv('pf-fb'),
    };
    try {
      const mobile = Auth.getMobile();
      if (mobile) {
        const r = await API.put(`/farmer/${mobile}`, updates);
        if (r.success) { cachedFarmer = r.farmer; toast('Profile updated!'); }
        else { toast('Update failed', 'red'); return; }
      } else {
        Object.assign(cachedFarmer, updates);
        toast('Changes saved (demo mode)');
      }
      Auth.setName(`${updates.firstName} ${updates.lastName}`);
      updateSidebarFarmer(cachedFarmer);
      cancelEdit();
    } catch { toast('Failed to save. Check backend.', 'red'); }
  }
  </script>
</body>
</html>
