<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farmer Portal</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url("farm.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Card */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 40px;
            width: 380px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 15px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .question {
            margin: 20px 0;
            font-weight: bold;
        }

        /* Buttons */
        button {
            width: 120px;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .yes-btn {
            background: #4caf50;
            color: white;
        }

        .no-btn {
            background: #f44336;
            color: white;
        }

        button:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Returning Form */
        .returning-form {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: #2e7d32;
            color: white;
            margin-top: 10px;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌾 Smart Farmer Advisory</h1>
        <div class="subtitle">AI Powered Guidance for Indian Farmers</div>

        <div id="initial">
            <div class="question">Are you new to us?</div>
            <button class="yes-btn" onclick="goToRegister()">Yes</button>
            <button class="no-btn" onclick="showReturning()">No</button>
        </div>

        <div class="returning-form" id="returnForm">
            <h3>Welcome Back 👋</h3>
            <input type="text" id="returnFirstName" placeholder="First Name" required>
            <input type="text" id="returnLastName" placeholder="Last Name" required>
            <input type="number" id="returnMobile" placeholder="Mobile Number" required>
            <button class="submit-btn" onclick="submitReturning()">Login</button>
        </div>
    </div>

    <script>
        function goToRegister() {
            window.location.href = "newsignin.html";
        }

        function showReturning() {
            document.getElementById("initial").style.display = "none";
            document.getElementById("returnForm").style.display = "block";
        }

        async function submitReturning() {

            const firstName = document.querySelector("#returnFirstName").value;
            const lastName = document.querySelector("#returnLastName").value;
            const mobile = document.querySelector("#returnMobile").value;

            if (!firstName || !lastName || !mobile) {
                alert("Please fill all fields");
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/api/farmers/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ firstName, lastName, mobile })
                });

                if (response.ok) {

                    // ⭐ STORE MOBILE FOR DASHBOARD USE
                    localStorage.setItem("farmerMobile", mobile);

                    window.location.href = "maindashboard.html";
                }
                else {
                    alert("User not found. Please register first.");
                }

            } catch (error) {
                alert("Server not running.");
                console.error(error);
            }
        }
    </script>
    <script src="script.js" charset="utf-8"></script>
</body>

</html>
