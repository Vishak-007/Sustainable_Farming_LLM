<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Crop Advice — Smart Farmer</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .advice-hero {
      background: linear-gradient(135deg, #1e3a24 0%, #3a9e4a 100%);
      border-radius: var(--r); padding: 22px 26px; color: #fff; margin-bottom: 18px;
    }
    .advice-hero h2 { font-family: 'Lora', serif; font-size: 1.3rem; margin-bottom: 6px; }
    .advice-hero p  { opacity: .75; font-size: .85rem; margin-bottom: 16px; line-height: 1.6; }
    .ai-row { display: flex; gap: 8px; }
    .ai-inp {
      flex: 1; padding: 10px 14px; border-radius: var(--r-sm);
      border: none; outline: none; font-family: inherit; font-size: .85rem;
      background: rgba(255,255,255,.18); color: #fff;
    }
    .ai-inp::placeholder { color: rgba(255,255,255,.5); }
    .ai-inp:focus { background: rgba(255,255,255,.25); }
    .ai-btn {
      padding: 10px 16px; border-radius: var(--r-sm);
      background: var(--accent); color: #fff; border: none;
      font-family: inherit; font-size: .82rem; font-weight: 800;
      cursor: pointer; transition: all var(--t); flex-shrink: 0;
    }
    .ai-btn:hover { background: #d97706; }
    .ai-btn:disabled { opacity: .6; cursor: not-allowed; }
    .ai-resp {
      display: none; margin-top: 12px;
      background: rgba(255,255,255,.12);
      border-left: 3px solid rgba(255,255,255,.5);
      border-radius: var(--r-sm); padding: 12px 14px;
      font-size: .83rem; line-height: 1.7;
    }
    .ai-resp.show { display: block; }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <!-- AI Advisor Hero -->
      <div class="advice-hero fade-in">
        <h2>🤖 Smart Farm Advisor</h2>
        <p>Get personalized, AI-powered answers to any farming question — tailored to your crop, soil & region.</p>
        <div class="ai-row">
          <input class="ai-inp" id="ai-q" type="text" placeholder="e.g. When to apply fertilizer for rice? What causes yellow leaves?">
          <button class="ai-btn" id="ai-btn" onclick="askAI()">Ask →</button>
        </div>
        <div class="ai-resp" id="ai-resp"></div>
      </div>

      <!-- Season Pill -->
      <div class="season-pill fade-in" id="season-pill">🗓️ Detecting current season…</div>

      <!-- Personalized Recommendations -->
      <div style="font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:12px;">📋 Personalized Recommendations</div>
      <div class="advice-card-grid" id="advice-grid">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>

      <!-- Disease Alerts -->
      <div class="card fade-in">
        <div class="card-title">🦠 Disease Alerts for Your Crop</div>
        <div class="disease-grid" id="disease-grid">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>

  <script src="shared.js"></script>
  <script>
  let farmerCtx = '';

  document.addEventListener('DOMContentLoaded', async () => {
    initPage('advice');
    const { farmer, advisory } = await loadFarmerData();
    updateSidebarFarmer(farmer);

    farmerCtx = `Farmer ${farmer.firstName} from ${farmer.state||'India'}. Crop: ${farmer.regularCrop}. Soil: ${farmer.soilType}. Land: ${farmer.landSize} ${farmer.landUnit}. Water: ${farmer.waterSource}. Fertilizer: ${farmer.fertilizerUsed||'unknown'}.`;

    const seasons = { kharif:'🌧️ Kharif Season (Jun–Nov)', rabi:'❄️ Rabi Season (Nov–Apr)', zaid:'☀️ Zaid Season (Mar–Jun)' };
    document.getElementById('season-pill').textContent = seasons[advisory.season] || '🗓️ ' + advisory.season;

    const advice = advisory.advice || [];
    document.getElementById('advice-grid').innerHTML = advice.length
      ? advice.map(a => `
          <div class="advice-card fade-in">
            <span class="ac-icon">${a.icon}</span>
            <div class="ac-title">${a.title}</div>
            <div class="ac-body">${a.body}</div>
          </div>`).join('')
      : '<p style="color:var(--text-3);font-size:.85rem;">No advice available right now.</p>';

    const crop = farmer.regularCrop || 'Rice';
    const diseases = DISEASE_DB[crop] || DISEASE_DB.default;
    document.getElementById('disease-grid').innerHTML = diseases.map(d => `
      <div class="disease-card fade-in">
        <div class="dis-name">⚠️ ${d.name}</div>
        <div class="dis-crop">Affects: ${crop}</div>
        <div class="dis-tip">💊 ${d.tip}</div>
      </div>`).join('');
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('ai-q')) askAI();
  });

  async function askAI() {
    const q = document.getElementById('ai-q').value.trim();
    if (!q) return;
    const btn  = document.getElementById('ai-btn');
    const resp = document.getElementById('ai-resp');
    btn.disabled = true; btn.textContent = '…';
    resp.className = 'ai-resp show';
    resp.innerHTML = '<em>Thinking…</em>';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          system: `You are an expert agricultural advisor for Indian farmers. Context: ${farmerCtx} Give practical advice in 2–4 sentences with specific quantities and timings.`,
          messages: [{ role: 'user', content: q }]
        })
      });
      const data = await res.json();
      resp.innerHTML = '<strong>🤖 Advisor:</strong> ' + (data.content?.[0]?.text || 'Could not get a response.');
    } catch {
      resp.innerHTML = '❌ Could not connect to AI advisor. Please try again.';
    } finally {
      btn.disabled = false; btn.textContent = 'Ask →';
    }
  }
  </script>
</body>
</html>
